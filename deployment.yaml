apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: e-commerce
  template:
    metadata:
      labels:
        app: e-commerce
    spec:
      containers:
      - name: django-conteneur
        image: ahmedbradai/e-commerce:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
          - name: DJANGO_SETTINGS_MODULE
            value: "mysite.settings"
          - name: ALLOWED_HOSTS
            value: "*"
          - name: PYTHONUNBUFFERED
            value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: django-app-service
spec:
  type: NodePort
  selector:
    app: e-commerce
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30000